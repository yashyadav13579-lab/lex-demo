name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  quality-and-integration:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: lexsovereign
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10

    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/lexsovereign
      NEXTAUTH_SECRET: ci-nextauth-secret
      NEXTAUTH_URL: http://127.0.0.1:3000
      NEXT_PUBLIC_DEMO_AUTH_ENABLED: "false"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Prisma generate
        run: npx prisma generate

      - name: Prisma push schema
        run: npx prisma db push

      - name: Static quality gates
        run: npm run check:ci

      - name: Start app
        run: |
          npm run start > /tmp/next.log 2>&1 &
          for i in {1..60}; do
            if curl -fsS http://127.0.0.1:3000/api/auth/session > /dev/null; then
              echo "Server is up"
              exit 0
            fi
            sleep 1
          done
          echo "Server did not start in time"
          cat /tmp/next.log
          exit 1

      - name: Backend smoke
        run: BASE_URL=http://127.0.0.1:3000 npm run check:backend

      - name: Backend integration matrix
        run: BASE_URL=http://127.0.0.1:3000 npm run check:backend:integration
